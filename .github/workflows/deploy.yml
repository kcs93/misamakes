name: Deploy via SSH

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 12 * * *"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x' # Use LTS version for stability
        cache: 'npm'
      
    - name: Install dependencies and build
      run: |
        npm install
        npm run build # Correct command for Vite (outputs to ./dist)

    - name: Deploy via SSH
      if: ${{ (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'schedule' }}
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.MY_TOKEN }}
        publish_dir: ./dist # Vite builds to 'dist', not '_site'   
